name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS Release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -workspace SwiftTA.xcworkspace \
            -scheme TAassets \
            -resolvePackageDependencies

      - name: Build TAassets (Release)
        run: |
          xcodebuild \
            -workspace SwiftTA.xcworkspace \
            -scheme TAassets \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build HPIView (Release)
        run: |
          xcodebuild \
            -workspace SwiftTA.xcworkspace \
            -scheme HPIView \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app bundles
        run: |
          mkdir -p dist
          PRODUCTS=build/DerivedData/Build/Products/Release
          ( cd "$PRODUCTS" && zip -ry "$GITHUB_WORKSPACE/dist/TAassets-macOS.zip" TAassets.app )
          ( cd "$PRODUCTS" && zip -ry "$GITHUB_WORKSPACE/dist/HPIView-macOS.zip" HPIView.app )
          ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SwiftTA-macOS-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

      # Rolling "latest" prerelease — refreshed on every main push so anyone
      # can grab a current build from the Releases page without needing a
      # GitHub login or waiting for an explicit tag. Versioned tags below
      # still produce their own permanent entries.
      - name: Update latest prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT=$(git rev-parse --short HEAD)
          NOTES="Rolling build from main.\n\nCommit: ${{ github.sha }}\nBuilt: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Delete prior latest release + tag (ignore failure if none exists).
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            dist/TAassets-macOS.zip \
            dist/HPIView-macOS.zip \
            --target "${{ github.sha }}" \
            --title "Latest main ($SHORT)" \
            --notes "$(printf '%b' "$NOTES")" \
            --prerelease

      - name: Publish versioned release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            dist/TAassets-macOS.zip \
            dist/HPIView-macOS.zip \
            --title "$TAG" \
            --generate-notes
